apiVersion: v1
name: kruise
description: Helm chart for kruise components
version: 1.9.0
appVersion: 1.9.0
kubeVersion: ">= 1.18.0-0"
icon: https://openkruise.io/img/openkruise-logo-bg.jpg
keywords:
  - openkruise
  - kubernetes
  - kruise
  - workload
  - statefulset
  - sidecar
  - job
  - deployment
  - cloneset
home: https://openkruise.io
sources:
  - https://github.com/openkruise/kruise
annotations:
  artifacthub.io/changes: |
    - "[Added]: AKS integration for webhooks via webhookConfiguration.aksIntegration to exclude AKS control-plane and managed namespaces"
    - "[Added]: v1beta1 admission review versions support for webhooks"
    - "[Added]: EphemeralJob validating webhook"
    - "[Changed]: Standardized webhook paths (removed v1alpha1 prefix from paths)"
    - "[Changed]: https://github.com/openkruise/kruise/blob/master/CHANGELOG.md"
    - "[Security]: Fix potential security issues of dependent packages"
