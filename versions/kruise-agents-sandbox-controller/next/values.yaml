# Default values for agents-sandbox-controller.
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: openkruise/agent-sandbox-controller
  pullPolicy: IfNotPresent
  tag: v0.3.0

# Webhook configuration
webhook:
  port: 9443

# Metrics configuration
metrics:
  # Port the controller binds for the Prometheus /metrics endpoint.
  # Served over HTTPS with authn/authz delegation to kube-apiserver
  # (controller-runtime's --metrics-secure=true default).
  port: 8443
  rbac:
    # Create a ClusterRole that grants `get` on the /metrics nonResourceURL.
    # Bind it to your Prometheus / ARMS scraper ServiceAccount to allow
    # scraping the HTTPS endpoint. Disable if you manage metrics RBAC
    # outside this chart.
    create: true

# Health probe configuration
healthProbe:
  port: 8081

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "2"
    memory: 4Gi

# Namespace configuration
namespace:
  name: sandbox-system

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: { }
  name: ""

# RBAC configuration
rbac:
  create: true

imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""

podAnnotations: { }
podLabels: { }

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true

nodeSelector: { }

tolerations: [ ]

affinity: { }
